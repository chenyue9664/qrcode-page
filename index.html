<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>你的专属客服</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
      background: linear-gradient(180deg, #e8f4f8 0%, #f0f7fa 50%, #f5f9fb 100%);
      min-height: 100vh;
      padding: 0 20px 30px;
    }
    
    /* 顶部导航 */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      height: 44px;
    }
    
    .nav-back {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #333;
    }
    
    .nav-title {
      font-size: 17px;
      font-weight: 500;
      color: #333;
    }
    
    .nav-more {
      display: flex;
      gap: 8px;
    }
    
    .nav-dot {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .nav-dot span {
      width: 4px;
      height: 4px;
      background: #333;
      border-radius: 50%;
      margin: 0 1px;
    }
    
    /* 头部标题区 */
    .header {
      padding: 20px 0 30px;
      position: relative;
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .header-text {
      flex: 1;
    }
    
    .main-title {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    
    .sub-title {
      font-size: 14px;
      color: #666;
    }
    
    .header-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      background: #e0e0e0;
      border: 2px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    
    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* 主卡片 */
    .main-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    
    .agent-info {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .agent-label {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }
    
    .agent-name {
      font-size: 18px;
      color: #333;
      font-weight: 600;
      margin-left: 8px;
    }
    
    .slogan-box {
      background: #f5f7fa;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    
    .slogan-text {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    .feature-tag {
      display: inline-flex;
      align-items: center;
      background: #e8f4f8;
      padding: 6px 14px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    
    .feature-icon {
      width: 14px;
      height: 14px;
      background: #4a90d9;
      border-radius: 50%;
      margin-right: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .feature-icon::after {
      content: '🔔';
      font-size: 8px;
    }
    
    .feature-text {
      font-size: 13px;
      color: #4a90d9;
    }
    
    /* 二维码区域 */
    .qrcode-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .qrcode-wrapper {
      background: linear-gradient(135deg, #5b9bd5 0%, #4a90d9 100%);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(74, 144, 217, 0.3);
    }
    
    .qrcode-inner {
      width: 200px;
      height: 200px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .qrcode-inner img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }
    
    .qrcode-placeholder {
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }
    
    .qrcode-hint {
      color: #4a90d9;
      font-size: 15px;
      font-weight: 500;
    }
    
    /* 步骤说明 */
    .steps {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      padding: 0 10px;
    }
    
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      max-width: 140px;
    }
    
    .step-num {
      width: 24px;
      height: 24px;
      background: #4a90d9;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .step-text {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    /* 提示 */
    .tips {
      text-align: center;
      margin-top: 20px;
      padding: 0 20px;
    }
    
    .tip-text {
      font-size: 12px;
      color: #999;
    }
    
    /* 操作按钮 */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding: 0 10px;
    }
    
    .btn {
      flex: 1;
      padding: 14px 0;
      border-radius: 10px;
      font-size: 15px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-primary {
      background: #4a90d9;
      color: #fff;
    }
    
    .btn-secondary {
      background: #f0f4f8;
      color: #4a90d9;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 1000;
    }
    
    .toast.show {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <div class="nav-bar">
    <div class="nav-back">‹</div>
    <div class="nav-title"></div>
    <div class="nav-more">
      <div class="nav-dot"><span></span><span></span><span></span></div>
      <div class="nav-dot" style="border: 1px solid #333; border-radius: 50%;">○</div>
    </div>
  </div>
  
  <!-- 头部 -->
  <div class="header">
    <div class="header-content">
      <div class="header-text">
        <div class="main-title">你的专属客服</div>
        <div class="sub-title">扫码添加管家，享一对一专属服务</div>
      </div>
      <div class="header-avatar" id="headerAvatar">
        <span style="font-size: 30px;">👤</span>
      </div>
    </div>
  </div>
  
  <!-- 主卡片 -->
  <div class="main-card">
    <div class="agent-info">
      <span class="agent-label">专业客服</span>
      <span class="agent-name" id="agentName">小沈</span>
    </div>
    
    <div class="slogan-box">
      <div class="slogan-text">"解决推广、效果问题我都能一对一帮你解决"</div>
    </div>
    
    <div class="feature-tag">
      <div class="feature-icon"></div>
      <span class="feature-text">"优惠活动提前通知你"</span>
    </div>
    
    <div class="qrcode-section">
      <div class="qrcode-wrapper">
        <div class="qrcode-inner" id="qrcodeBox">
          <div class="qrcode-placeholder">
            请上传<br>二维码
          </div>
        </div>
      </div>
      <div class="qrcode-hint">长按识别二维码添加</div>
    </div>
  </div>
  
  <!-- 步骤 -->
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">长按二维码打开企微名片</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">添加专属客服至通讯录</div>
    </div>
  </div>
  
  <!-- 提示 -->
  <div class="tips">
    <div class="tip-text">添加后请备注您的店铺名称 · 服务时间：工作日 9:00-18:00</div>
  </div>
  
  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn btn-primary" onclick="saveImage()">保存二维码</button>
    <button class="btn btn-secondary" onclick="sharePage()">分享页面</button>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    // ==================== 配置区域 ====================
    // 修改这里配置你的信息
    const CONFIG = {
      // 客服名字
      agentName: '小沈',
      // 客服头像（可选）
      avatarUrl: '', // 例如: 'https://example.com/avatar.jpg'
      // 企业微信二维码图片地址（必填）
      qrcodeUrl: 'https://imgchr.com/i/penmJld'
    };
    // =================================================
    
    // 初始化页面
    function init() {
      // 设置客服名字
      document.getElementById('agentName').textContent = CONFIG.agentName;
      
      // 设置头像
      if (CONFIG.avatarUrl) {
        document.getElementById('headerAvatar').innerHTML = 
          `<img src="${CONFIG.avatarUrl}" alt="头像">`;
      }
      
      // 设置二维码
      if (CONFIG.qrcodeUrl && !CONFIG.qrcodeUrl.includes('your-qrcode')) {
        document.getElementById('qrcodeBox').innerHTML = 
          `<img src="${CONFIG.qrcodeUrl}" alt="企微二维码" id="qrcodeImg">`;
      }
    }
    
    // 显示提示
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    // 保存图片
    function saveImage() {
      const img = document.getElementById('qrcodeImg');
      if (!img) {
        showToast('请先配置二维码图片');
        return;
      }
      showToast('请长按图片保存到相册');
    }
    
    // 分享页面
    function sharePage() {
      if (navigator.share) {
        navigator.share({
          title: '你的专属客服 - ' + CONFIG.agentName,
          text: '扫码添加，享受一对一专属服务',
          url: window.location.href
        });
      } else {
        // 复制链接
        const input = document.createElement('input');
        input.value = window.location.href;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('链接已复制');
      }
    }
    
    // 页面加载完成后初始化
    window.onload = init;
  </script>
</body>
</html>
